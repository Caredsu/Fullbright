<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # **CRITICAL FIX: Redirect /teacher-eval/* to root level (remove /teacher-eval/ prefix)**
            # This handles cases where the app is accessed with /teacher-eval/ but deployed at root
            RewriteCond %{REQUEST_URI} ^/teacher-eval/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^teacher-eval/(.*)$ /$1 [R=301,L]
            
            # **Handle /pwa/ and /pwa directory requests - serve index.html**
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^pwa/?$ pwa/index.html [L]
            
            # **For all other pwa/* files, let Apache serve them as static files**
            RewriteRule ^pwa/ - [L]
            
            # Don't rewrite if it's a real file
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^(.*)$ - [L]
            
            # Don't rewrite if it's a real directory
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^(.*)$ - [L]
            
            # Route everything else to index.php
            RewriteRule ^(.*)$ index.php?request=$1 [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
