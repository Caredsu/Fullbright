<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html/pwa
    
    # Alias for API endpoint
    Alias /api /var/www/html/api
    
    # Alias for Admin panel
    Alias /admin /var/www/html/admin
    
    # Main React app
    <Directory /var/www/html/pwa>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Don't rewrite if it's a real file
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^ - [L]
            
            # Don't rewrite if it's a real directory
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            
            # Rewrite all other requests to index.html for React Router
            RewriteRule ^.*$ index.html [L]
        </IfModule>
    </Directory>
    
    # API endpoints
    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Admin panel
    <Directory /var/www/html/admin>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
