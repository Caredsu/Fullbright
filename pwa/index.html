<!DOCTYPE html>
<html>
<head>
  <!-- Set base href dynamically based on current location -->
  <script>
    (function() {
      const pathname = window.location.pathname;
      const pwaIndex = pathname.indexOf('/pwa/');
      let baseHref = '/';
      
      if (pwaIndex !== -1) {
        baseHref = pathname.substring(0, pwaIndex + 5); // e.g., "/pwa/" or "/teacher-eval/pwa/"
      } else if (pathname.includes('/teacher-eval/')) {
        baseHref = '/teacher-eval/pwa/';
      } else {
        baseHref = '/pwa/';
      }
      
      // Create base tag before any other resources load
      const base = document.createElement('base');
      base.href = baseHref;
      document.head.appendChild(base);
      
      console.log('[PWA] Set base href to:', baseHref);
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="teacher_eval_app">
  
  <!-- Detect base path dynamically -->
  <script>
    // Detect the base path where pwa folder is located
    (function() {
        const pathname = window.location.pathname;
        const pwaIndex = pathname.indexOf('/pwa/');
        
        if (pwaIndex !== -1) {
            window.PWA_BASE_PATH = pathname.substring(0, pwaIndex + 5); // e.g., "/teacher-eval/pwa/" or "/pwa/"
        } else if (pathname.includes('/teacher-eval/')) {
            window.PWA_BASE_PATH = '/teacher-eval/pwa/';
        } else {
            window.PWA_BASE_PATH = '/pwa/';
        }
        
        console.log('[PWA] Detected base path:', window.PWA_BASE_PATH);
        
        // Now fix all hardcoded asset paths
        setTimeout(() => {
            // Fix icon href
            const iconLink = document.querySelector('link[rel="icon"]');
            if (iconLink && iconLink.href.includes('/teacher-eval/pwa/')) {
                iconLink.href = window.PWA_BASE_PATH + 'assets/assets/images/fbc_logo2.png';
            }
            
            // Fix apple-touch-icon
            const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
            if (appleTouchIcon && appleTouchIcon.href.includes('/teacher-eval/pwa/')) {
                appleTouchIcon.href = window.PWA_BASE_PATH + 'assets/assets/images/fbc_logo2.png';
            }
            
            // Fix manifest
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (manifestLink && manifestLink.href.includes('/teacher-eval/pwa/')) {
                manifestLink.href = window.PWA_BASE_PATH + 'manifest.json';
            }
        }, 0);
    })();
  </script>
  
  <link rel="apple-touch-icon" href="assets/assets/images/fbc_logo2.png">
  <link rel="icon" type="image/png" href="assets/assets/images/fbc_logo2.png"/>
  <title>teacher_eval_app</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Loading Animation Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    #app-loading-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1419;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    
    .app-loader-progress-container {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
    }
    
    .app-loader-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #06b6d4, #0ea5e9);
      border-radius: 10px;
      width: 0%;
      animation-name: progress-animation;
      animation-duration: 1.5s;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      animation-iteration-count: 1 !important;
      animation-fill-mode: forwards !important;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.8);
    }
    
    @keyframes progress-animation {
      0% {
        width: 0%;
      }
      20% {
        width: 15%;
      }
      40% {
        width: 35%;
      }
      60% {
        width: 65%;
      }
      80% {
        width: 85%;
      }
      100% {
        width: 100%;
      }
    }
    
    .app-loading-text {
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    
    @keyframes dots-unused {
      /* Removed: JavaScript is handling the dots animation */
      0%, 20% {
        content: 'Loading';
        color: #64748b;
      }
      40% {
        content: 'Loading.';
        color: #94a3b8;
      }
      60% {
        content: 'Loading..';
        color: #cbd5e1;
      }
      80%, 100% {
        content: 'Loading...';
        color: #64748b;
      }
    }
    
    /* Hide loading container when Flutter app is ready */
    #app-loading-container.hidden {
      display: none;
    }

    /* Aggressive button hiding */
    *:not(html):not(body) {
      /* This will be overridden by the JavaScript */
    }
  </style>
</head>
<body>
  <!-- Loading Animation -->
  <div id="app-loading-container">
    <div class="app-loader-progress-container">
      <div class="app-loader-progress-bar"></div>
    </div>
    <div class="app-loading-text">Loading......</div>
  </div>
  <!-- Fix asset paths FIRST, before anything else loads -->
  <script>
    // Ensure PWA_BASE_PATH is set before loading scripts
    if (!window.PWA_BASE_PATH) {
      const pathname = window.location.pathname;
      const pwaIndex = pathname.indexOf('/pwa/');
      if (pwaIndex !== -1) {
        window.PWA_BASE_PATH = pathname.substring(0, pwaIndex + 5);
      } else if (pathname.includes('/teacher-eval/')) {
        window.PWA_BASE_PATH = '/teacher-eval/pwa/';
      } else {
        window.PWA_BASE_PATH = '/pwa/';
      }
    }
  </script>
  
  <script src="fix_assets.js"></script>
  
  <!-- Set up Flutter paths before loading -->
  <script>
    window._flutter = window._flutter || {};
    window._flutter.buildConfig = {
        "engineRevision": "425cfb54d01a9472b3e81d9e76fd63a4a44cfbcb",
        "builds": [{
            "compileTarget": "dart2js",
            "renderer": "canvaskit",
            "mainJsPath": "main.dart.js"
        }]
    };
  </script>
  
  <script src="flutter.js"></script>
  <script src="flutter_bootstrap.js"></script>
  
  <!-- Pre-load teacher data while loading screen is showing -->
  <script>
    (function() {
      const baseUrl = window.PWA_BASE_PATH || '/teacher-eval/pwa/';
      const apiUrl = baseUrl.replace('/pwa/', '/api/');
      
      // Determine API base - handle both local and remote
      let apiBase = '';
      if (window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')) {
        apiBase = window.location.origin + apiUrl;
      } else {
        // For production, use configured API endpoint
        apiBase = 'https://fullbright-college-1.onrender.com/api/';
      }
      
      console.log('[PWA] Pre-loading teacher list from:', apiBase);
      
      // Pre-fetch teacher list in background
      fetch(apiBase + 'teachers')
        .then(response => response.json())
        .then(data => {
          // Cache in session storage for Flutter app to use
          if (window.sessionStorage) {
            window.sessionStorage.setItem('cached_teachers', JSON.stringify(data.data || []));
            console.log('[PWA] Teacher list cached:', (data.data || []).length, 'teachers');
          }
        })
        .catch(err => {
          console.log('[PWA] Pre-load failed (expected if offline):', err.message);
        });
    })();
  </script>
  
  <script>
    console.log('[PWA] Loading animation script started');
    
    // Flag to ensure hide logic only runs once
    let loadingHidden = false;
    
    // Ensure loading container is visible immediately
    const loadingContainer = document.getElementById('app-loading-container');
    if (loadingContainer) {
      loadingContainer.classList.remove('hidden');
      console.log('[PWA] Loading container made visible');
    }
    
    // Track when loading started
    const loadingStartTime = Date.now();
    const MINIMUM_LOADING_TIME = 500; // Minimal delay to let bar animate
    
    // Animate loading text with dots
    let dotCount = 0;
    const dotInterval = setInterval(() => {
      const loadingText = document.querySelector('.app-loading-text');
      if (loadingText && loadingContainer && !loadingContainer.classList.contains('hidden')) {
        dotCount = (dotCount + 1) % 4;
        loadingText.textContent = 'Loading' + '.'.repeat(dotCount) + (dotCount === 0 ? '...' : '');
      }
    }, 400);
    
    // Hide loading animation (with minimum display time) - only run once!
    function hideLoadingAnimation() {
      if (loadingHidden) {
        console.log('[PWA] Loading already hidden, skipping');
        return;
      }
      
      loadingHidden = true;
      const container = document.getElementById('app-loading-container');
      if (container && !container.classList.contains('hidden')) {
        const elapsedTime = Date.now() - loadingStartTime;
        const timeToWait = Math.max(0, MINIMUM_LOADING_TIME - elapsedTime);
        
        if (timeToWait > 0) {
          console.log(`[PWA] Will hide loading in ${timeToWait}ms (minimum display time)`);
          setTimeout(() => {
            container.classList.add('hidden');
            clearInterval(dotInterval);
            console.log('[PWA] Loading animation hidden after minimum time');
          }, timeToWait);
        } else {
          container.classList.add('hidden');
          clearInterval(dotInterval);
          console.log('[PWA] Loading animation hidden immediately');
        }
      }
    }
    
    // Monitor for when app container is created
    const observer = new MutationObserver((mutations) => {
      if (!loadingHidden && document.querySelector('flt-renderer') !== null) {
        console.log('[PWA] Flutter renderer detected, will hide loading');
        hideLoadingAnimation();
        observer.disconnect();
      }
    });
    
    observer.observe(document.body, { 
      childList: true, 
      subtree: true 
    });
    
    // Flutter loader is already called by flutter_bootstrap.js automatically
    // Do NOT call loader.load() again here to avoid duplicate initialization
    console.log('[PWA] Bootstrap already handled by flutter_bootstrap.js');
    
    // Fallback: hide after 5 seconds if Flutter doesn't render
    setTimeout(() => {
      if (!loadingHidden) {
        console.log('[PWA] Fallback timeout - hiding loading');
        hideLoadingAnimation();
      }
    }, 5000);
  </script>

  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swPath = (window.PWA_BASE_PATH || './') + 'service-worker.js';
        navigator.serviceWorker.register(swPath)
          .then((reg) => {
            console.log('Service Worker registered:', reg);
          })
          .catch((err) => {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>

  <!-- Hide Edit Evaluation Button - Aggressive Flutter-aware approach -->
  <script>
    // Store references to hidden elements
    const hiddenElements = new WeakSet();

    function hideEditButton() {
      try {
        // Method 1: Search entire DOM tree recursively
        const walker = document.createTreeWalker(
          document.body,
          NodeFilter.SHOW_TEXT,
          null,
          false
        );

        let node;
        while (node = walker.nextNode()) {
          if (node.textContent.includes('Edit Evaluation')) {
            // Found the text - traverse up to find clickable parent
            let parent = node.parentElement;
            let clickableParent = null;
            
            // Traverse up max 10 levels
            for (let i = 0; i < 10 && parent; i++) {
              const role = parent.getAttribute('role');
              if (parent.onclick || role === 'button' || parent.tagName === 'BUTTON' || 
                  parent.style.cursor === 'pointer' || parent.classList.contains('button') ||
                  parent.classList.toString().includes('button')) {
                clickableParent = parent;
                break;
              }
              parent = parent.parentElement;
            }
            
            // If found, hide it
            if (clickableParent && !hiddenElements.has(clickableParent)) {
              clickableParent.style.display = 'none';
              clickableParent.style.pointerEvents = 'none';
              clickableParent.style.visibility = 'hidden';
              clickableParent.style.height = '0';
              clickableParent.style.overflow = 'hidden';
              clickableParent.setAttribute('data-hidden-by-pwa', 'true');
              hiddenElements.add(clickableParent);
              console.log('[PWA] ✓ Edit Evaluation button hidden');
            }
          }
        }

        // Method 2: Check all elements with potential button styles
        document.querySelectorAll('[style*="cursor"], [class*="button"], button, [role="button"]').forEach(el => {
          if ((el.innerText || el.textContent || '').includes('Edit Evaluation') && !hiddenElements.has(el)) {
            el.style.display = 'none';
            el.style.pointerEvents = 'none';
            el.style.visibility = 'hidden';
            el.setAttribute('data-hidden-by-pwa', 'true');
            hiddenElements.add(el);
            console.log('[PWA] ✓ Edit Evaluation button hidden (method 2)');
          }
        });
      } catch (e) {
        console.log('[PWA] Error hiding button:', e.message);
      }
    }

    // Run immediately on script load
    document.addEventListener('DOMContentLoaded', hideEditButton);
    window.addEventListener('load', hideEditButton);

    // Observe DOM mutations
    const observer = new MutationObserver(() => {
      hideEditButton();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    // Additional periodic checks (every 1 second for 10 seconds)
    let checkCount = 0;
    const checkInterval = setInterval(() => {
      hideEditButton();
      checkCount++;
      if (checkCount > 10) {
        clearInterval(checkInterval);
      }
    }, 1000);

    // Immediate first check
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', hideEditButton);
    } else {
      hideEditButton();
    }
  </script>
</body>
</html>
