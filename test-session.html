<!DOCTYPE html>
<html>
<head>
    <title>Session Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
        button:hover { background: #0056b3; }
        .output { margin-top: 20px; padding: 10px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 3px; white-space: pre-wrap; font-family: monospace; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Session Persistence Test</h1>
        
        <p>This test checks if your browser properly maintains session cookies</p>
        
        <button onclick="setSession()">Step 1: Set Session Data</button>
        <button onclick="getSession()">Step 2: Get Session Data</button>
        <button onclick="clearOutput()">Clear Output</button>
        
        <div id="output" class="output">Test output will appear here...</div>
    </div>

    <script>
        async function setSession() {
            const output = document.getElementById('output');
            output.innerHTML = '⏳ Setting session data...';
            
            try {
                const response = await fetch('/teacher-eval/test-session.php?action=set', {
                    method: 'GET',
                    credentials: 'include'  // IMPORTANT: Include cookies
                });
                
                const data = await response.json();
                output.innerHTML = `<span class="success">✓ Session data SET</span>\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.innerHTML = `<span class="error">✗ Error: ${error.message}</span>`;
            }
        }
        
        async function getSession() {
            const output = document.getElementById('output');
            output.innerHTML = '⏳ Getting session data...';
            
            try {
                const response = await fetch('/teacher-eval/test-session.php?action=get', {
                    method: 'GET',
                    credentials: 'include'  // IMPORTANT: Include cookies
                });
                
                const data = await response.json();
                
                if (data.data_loaded.admin_id) {
                    output.innerHTML = `<span class="success">✓ Session data LOADED successfully!</span>\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    output.innerHTML = `<span class="error">✗ Session data NOT loaded (admin_id is null)</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                output.innerHTML = `<span class="error">✗ Error: ${error.message}</span>`;
            }
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = 'Test output will appear here...';
        }
    </script>
</body>
</html>
