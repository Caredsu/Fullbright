<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Serve PWA React app from /pwa at root when accessing root paths
            # If accessing root and pwa folder exists, serve from there
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !^/api/
            RewriteCond %{REQUEST_URI} !^/admin/
            RewriteCond %{REQUEST_URI} !^/includes/
            RewriteCond %{REQUEST_URI} !^/app/
            RewriteCond %{REQUEST_URI} !^/config/
            RewriteCond %{REQUEST_URI} !^/vendor/
            RewriteCond %{REQUEST_URI} !^/assets/
            RewriteCond %{REQUEST_URI} !^/downloads/
            # Route to React app's index.html
            RewriteRule ^.*$ pwa/index.html [L]
        </IfModule>
    </Directory>

    # Alias for PWA React app at root
    Alias / /var/www/html/pwa/

    <Directory /var/www/html/pwa>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            # React Router: route everything to index.html except actual files
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^.*$ index.html [L]
        </IfModule>
    </Directory>

    # API endpoints in PHP
    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /api/
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
