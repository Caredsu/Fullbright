<!DOCTYPE html>
<html>
<head>
  <!-- Set base href dynamically based on current location -->
  <script>
    (function() {
      const pathname = window.location.pathname;
      const pwaIndex = pathname.indexOf('/pwa/');
      let baseHref = '/';
      
      if (pwaIndex !== -1) {
        baseHref = pathname.substring(0, pwaIndex + 5); // e.g., "/pwa/" or "/teacher-eval/pwa/"
      } else if (pathname.includes('/teacher-eval/')) {
        baseHref = '/teacher-eval/pwa/';
      } else {
        baseHref = '/pwa/';
      }
      
      // Create base tag before any other resources load
      const base = document.createElement('base');
      base.href = baseHref;
      document.head.appendChild(base);
      
      console.log('[PWA] Set base href to:', baseHref);
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="teacher_eval_app">
  
  <!-- Detect base path dynamically -->
  <script>
    // Detect the base path where pwa folder is located
    (function() {
        const pathname = window.location.pathname;
        const pwaIndex = pathname.indexOf('/pwa/');
        
        if (pwaIndex !== -1) {
            window.PWA_BASE_PATH = pathname.substring(0, pwaIndex + 5); // e.g., "/teacher-eval/pwa/" or "/pwa/"
        } else if (pathname.includes('/teacher-eval/')) {
            window.PWA_BASE_PATH = '/teacher-eval/pwa/';
        } else {
            window.PWA_BASE_PATH = '/pwa/';
        }
        
        console.log('[PWA] Detected base path:', window.PWA_BASE_PATH);
        
        // Now fix all hardcoded asset paths
        setTimeout(() => {
            // Fix icon href
            const iconLink = document.querySelector('link[rel="icon"]');
            if (iconLink && iconLink.href.includes('/teacher-eval/pwa/')) {
                iconLink.href = window.PWA_BASE_PATH + 'assets/assets/images/fbc_logo2.png';
            }
            
            // Fix apple-touch-icon
            const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
            if (appleTouchIcon && appleTouchIcon.href.includes('/teacher-eval/pwa/')) {
                appleTouchIcon.href = window.PWA_BASE_PATH + 'assets/assets/images/fbc_logo2.png';
            }
            
            // Fix manifest
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (manifestLink && manifestLink.href.includes('/teacher-eval/pwa/')) {
                manifestLink.href = window.PWA_BASE_PATH + 'manifest.json';
            }
        }, 0);
    })();
  </script>
  
  <link rel="apple-touch-icon" href="assets/assets/images/fbc_logo2.png">
  <link rel="icon" type="image/png" href="assets/assets/images/fbc_logo2.png"/>
  <title>teacher_eval_app</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Loading Animation Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    #app-loading-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1419;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    
    .app-loader-progress-container {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
    }
    
    .app-loader-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #06b6d4, #0ea5e9);
      border-radius: 10px;
      animation: progress-animation 2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.8);
    }
    
    @keyframes progress-animation {
      0% {
        width: 0%;
      }
      50% {
        width: 70%;
      }
      100% {
        width: 100%;
      }
    }
    
    .app-loading-text {
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% {
        content: 'Loading';
        color: #64748b;
      }
      40% {
        content: 'Loading.';
        color: #94a3b8;
      }
      60% {
        content: 'Loading..';
        color: #cbd5e1;
      }
      80%, 100% {
        content: 'Loading...';
        color: #64748b;
      }
    }
    
    /* Hide loading container when Flutter app is ready */
    #app-loading-container.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loading Animation -->
  <div id="app-loading-container">
    <div class="app-loader-progress-container">
      <div class="app-loader-progress-bar"></div>
    </div>
    <div class="app-loading-text">Loading......</div>
  </div>
  <!-- Fix asset paths FIRST, before anything else loads -->
  <script>
    // Ensure PWA_BASE_PATH is set before loading scripts
    if (!window.PWA_BASE_PATH) {
      const pathname = window.location.pathname;
      const pwaIndex = pathname.indexOf('/pwa/');
      if (pwaIndex !== -1) {
        window.PWA_BASE_PATH = pathname.substring(0, pwaIndex + 5);
      } else if (pathname.includes('/teacher-eval/')) {
        window.PWA_BASE_PATH = '/teacher-eval/pwa/';
      } else {
        window.PWA_BASE_PATH = '/pwa/';
      }
    }
  </script>
  
  <script src="fix_assets.js"></script>
  
  <!-- Set up Flutter paths before loading -->
  <script>
    window._flutter = window._flutter || {};
    window._flutter.buildConfig = {
        "engineRevision": "425cfb54d01a9472b3e81d9e76fd63a4a44cfbcb",
        "builds": [{
            "compileTarget": "dart2js",
            "renderer": "canvaskit",
            "mainJsPath": "main.dart.js"
        }]
    };
  </script>
  
  <script src="flutter.js"></script>
  <script>
    console.log('[PWA] Loading animation script started');
    
    // Ensure loading container is visible immediately
    const loadingContainer = document.getElementById('app-loading-container');
    if (loadingContainer) {
      loadingContainer.classList.remove('hidden');
      console.log('[PWA] Loading container made visible');
    }
    
    // Track when loading started
    const loadingStartTime = Date.now();
    const MINIMUM_LOADING_TIME = 3000; // Show loading bar for at least 3 seconds
    
    // Animate loading text with dots
    let dotCount = 0;
    const dotInterval = setInterval(() => {
      const loadingText = document.querySelector('.app-loading-text');
      if (loadingText && loadingContainer && !loadingContainer.classList.contains('hidden')) {
        dotCount = (dotCount + 1) % 4;
        loadingText.textContent = 'Loading' + '.'.repeat(dotCount) + (dotCount === 0 ? '...' : '');
      }
    }, 400);
    
    // Hide loading animation (with minimum display time)
    function hideLoadingAnimation() {
      const container = document.getElementById('app-loading-container');
      if (container && !container.classList.contains('hidden')) {
        const elapsedTime = Date.now() - loadingStartTime;
        const timeToWait = Math.max(0, MINIMUM_LOADING_TIME - elapsedTime);
        
        if (timeToWait > 0) {
          console.log(`[PWA] Will hide loading in ${timeToWait}ms (minimum display time)`);
          setTimeout(() => {
            container.classList.add('hidden');
            clearInterval(dotInterval);
            console.log('[PWA] Loading animation hidden');
          }, timeToWait);
        } else {
          container.classList.add('hidden');
          clearInterval(dotInterval);
          console.log('[PWA] Loading animation hidden immediately');
        }
      }
    }
    
    // Monitor for when app container is created (Flutter renders to #app-container or similar)
    let observerTriggered = false;
    const observer = new MutationObserver((mutations) => {
      if (!observerTriggered && document.body.children.length > 5) {
        console.log('[PWA] Flutter content detected, will hide loading');
        observerTriggered = true;
        hideLoadingAnimation();
        observer.disconnect();
      }
    });
    
    observer.observe(document.body, { 
      childList: true, 
      subtree: true 
    });
    
    // Load Flutter app
    if (window._flutter && window._flutter.loader) {
      console.log('[PWA] Flutter loader found, loading app');
      window._flutter.loader.load({
          config: {
              entrypointBaseUrl: window.PWA_BASE_PATH || './'
          }
      });
    } else {
      console.error('Flutter loader not available');
      setTimeout(hideLoadingAnimation, 1000);
    }
    
    // Fallback: hide after 15 seconds if Flutter doesn't render
    setTimeout(() => {
      console.log('[PWA] Fallback timeout - hiding loading');
      hideLoadingAnimation();
    }, 15000);
  </script>

  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swPath = (window.PWA_BASE_PATH || './') + 'service-worker.js';
        navigator.serviceWorker.register(swPath)
          .then((reg) => {
            console.log('Service Worker registered:', reg);
          })
          .catch((err) => {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
