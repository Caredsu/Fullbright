<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # API and Admin - don't rewrite these
            RewriteRule ^api/ - [L]
            RewriteRule ^admin/ - [L]
            RewriteRule ^includes/ - [L]
            RewriteRule ^app/ - [L]
            RewriteRule ^config/ - [L]
            RewriteRule ^vendor/ - [L]
            RewriteRule ^storage/ - [L]
            RewriteRule ^downloads/ - [L]
            
            # Don't rewrite if it's a real file (CSS, JS, images, etc)
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^ - [L]
            
            # Don't rewrite if it's a real directory
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            
            # For requests to /pwa or root - serve React app
            RewriteRule ^(pwa/)?(.*)$ pwa/index.html [L]
        </IfModule>
    </Directory>
    
    <Directory /var/www/html/pwa>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <Directory /var/www/html/admin>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
